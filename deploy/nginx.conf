worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Rate limiting (applied only to the API)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/ld+json
        image/svg+xml;

    # Docker internal DNS resolver — allows Nginx to start even if
    # upstream containers are not yet running
    resolver 127.0.0.11 valid=10s;

    # Shared proxy headers for the API
    proxy_http_version 1.1;

    # -------- Shared location snippets --------

    # Re-used inside each server block via includes-like copy/paste
    # (nginx doesn't support location inheritance across server blocks).

    # Hide nginx version in headers/error pages
    server_tokens off;

    # -------- Shared security headers --------
    # HSTS is set only inside the 443 block (it requires HTTPS).
    # These are safe to send on every response and help on both HTTP and HTTPS.
    map $sent_http_content_type $_csp_default {
        default "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
    }

    # ========================================================================
    # HTTP (port 80) — serves Let's Encrypt challenge + the site until SSL is set up.
    # After certbot succeeds:
    #   1) Uncomment the `return 301` line below to force HTTPS.
    #   2) Uncomment the HTTPS server block at the bottom of this file.
    # ========================================================================
    server {
        listen 80;
        server_name _;

        # Let's Encrypt challenge — must stay on HTTP even after HTTPS is enabled
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Security headers (also applied on HTTP so attack surface during
        # pre-HTTPS rollout is minimized).
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy $_csp_default always;

        # >>> ENABLE AFTER CERTBOT: force every non-ACME request onto HTTPS.
        # return 301 https://$host$request_uri;

        # ---------- API (backend) ----------
        # The backend mounts its routes under /api/v1/, so proxy /api/ as-is.
        location /api/ {
            set $upstream http://api:3000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=api burst=50 nodelay;
        }

        # Stripe webhook — no rate limit, needs raw body forwarded
        location = /api/v1/payments/webhook {
            set $upstream http://api:3000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Stripe-Signature $http_stripe_signature;
        }

        # ---------- User-uploaded files (e.g. support ticket attachments) ----------
        # Backend writes to ./uploads (Docker volume api-uploads) and exposes /uploads/*
        # via express.static. Proxy through so files are reachable from the public host.
        location /uploads/ {
            set $upstream http://api:3000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 25m;
            proxy_read_timeout 60s;
        }

        # ---------- Admin dashboard (static SPA) ----------
        location /admin/ {
            alias /var/www/admin/;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Redirect /admin to /admin/
        location = /admin {
            return 301 /admin/;
        }

        # ---------- Marketing landing (static, multi-language) ----------
        # Pre-rendered static HTML: /, /ca/, /en/, /privacy, /terms, etc.
        # long-cache hashed assets
        location /assets/ {
            root /var/www/landing;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        location / {
            root /var/www/landing;
            index index.html;
            # Serve pre-rendered HTML for known routes, otherwise fall back to ES index.
            try_files $uri $uri/ $uri.html =404;
        }
    }

    # ========================================================================
    # HTTPS (port 443) — enable after certbot succeeds.
    #
    # Activation checklist:
    #   1) Ensure /etc/letsencrypt/live/azafaran.es/fullchain.pem exists.
    #   2) Uncomment this entire block.
    #   3) Uncomment the `return 301` redirect in the port-80 server above.
    #   4) `nginx -t && nginx -s reload`.
    # ========================================================================
    # server {
    #     listen 443 ssl http2;
    #     server_name www.azafaran.es azafaran.es;
    #
    #     ssl_certificate     /etc/letsencrypt/live/azafaran.es/fullchain.pem;
