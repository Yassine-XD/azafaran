worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Rate limiting (applied only to the API)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/ld+json
        image/svg+xml;

    # Docker internal DNS resolver — allows Nginx to start even if
    # upstream containers are not yet running
    resolver 127.0.0.11 valid=10s;

    # Shared proxy headers for the API
    proxy_http_version 1.1;

    # -------- Shared location snippets --------

    # Re-used inside each server block via includes-like copy/paste
    # (nginx doesn't support location inheritance across server blocks).

    # ========================================================================
    # HTTP (port 80) — serves Let's Encrypt challenge + the site until SSL is set up.
    # After SSL, keep only the ACME + 301 redirect block.
    # ========================================================================
    server {
        listen 80;
        server_name _;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # After certbot succeeds, uncomment the next line and comment out
        # the remaining location blocks below to force HTTPS.
        # return 301 https://$host$request_uri;

        # ---------- API (backend) ----------
        # The backend mounts its routes under /api/v1/, so proxy /api/ as-is.
        location /api/ {
            set $upstream http://api:3000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=api burst=50 nodelay;
        }

        # Stripe webhook — no rate limit, needs raw body forwarded
        location = /api/v1/payments/webhook {
            set $upstream http://api:3000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Stripe-Signature $http_stripe_signature;
        }

        # ---------- Admin dashboard (static SPA) ----------
        location /admin/ {
            alias /var/www/admin/;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Redirect /admin to /admin/
        location = /admin {
            return 301 /admin/;
        }

        # ---------- Marketing landing (static, multi-language) ----------
        # Pre-rendered static HTML: /, /ca/, /en/, /privacy, /terms, etc.
        # long-cache hashed assets
        location /assets/ {
            root /var/www/landing;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        location / {
            root /var/www/landing;
            index index.html;
            # Serve pre-rendered HTML for known routes, otherwise fall back to ES index.
            try_files $uri $uri/ $uri.html =404;
        }
    }

    # ========================================================================
    # HTTPS (port 443) — enable after certbot succeeds.
    # ========================================================================
