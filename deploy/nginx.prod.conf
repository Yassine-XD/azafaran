worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Docker internal DNS resolver — allows Nginx to start even if
    # upstream containers are not yet running
    resolver 127.0.0.11 valid=10s;

    # HTTP: ACME challenge + redirect everything else to HTTPS
    server {
        listen 80;
        server_name azafaran.es www.azafaran.es;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name azafaran.es www.azafaran.es;

        ssl_certificate /etc/letsencrypt/live/azafaran.es/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/azafaran.es/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Admin dashboard (static SPA)
        location /admin/ {
            alias /var/www/admin/;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location = /admin {
            return 301 /admin/;
        }

        # Stripe webhook — no rate limit, needs raw body + signature header
        location /api/v1/payments/webhook {
            set $upstream http://api:3000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Stripe-Signature $http_stripe_signature;
        }

        # API
        location / {
            set $upstream http://api:3000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=api burst=50 nodelay;
        }
    }
}
