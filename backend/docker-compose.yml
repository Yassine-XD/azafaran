services:
  postgres:
    image: postgres:15-alpine
    container_name: azafaran-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: azafaran
    ports:
      - "5432:5432"
    volumes:
      - ca-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ca-postgres-data:
